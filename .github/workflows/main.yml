name: EastMoney Guba Spider (Manual)

on:
  workflow_dispatch: # 开启手动触发
    inputs:
      stock_code:
        description: '请输入要爬取的股票代码 (如: 600900, 000001)'
        required: true
        default: '600900'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Spider
        env:
          # 注意：这里引用了你手动输入的参数
          STOCK_CODE: ${{ github.event.inputs.stock_code }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # 使用变量名动态生成提交信息
          git commit -m "Update data for ${{ github.event.inputs.stock_code }} [skip ci]" || exit 0
          git push
