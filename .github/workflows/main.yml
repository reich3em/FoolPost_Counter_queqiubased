name: EastMoney Guba Spider

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *' # 每天凌晨1点自动运行
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # 赋予提交权限
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Spider
        env:
          STOCK_CODE: "600900" # 你可以修改为你感兴趣的代码
        run: python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update guba data [skip ci]" || exit 0
          git push
