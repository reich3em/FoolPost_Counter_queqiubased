name: Snowball Scraper

# 定义触发方式：手动触发 (workflow_dispatch)
on:
  workflow_dispatch:
    inputs:
      stock_id:
        description: '请输入股票代码 (例如: SH000001, SZ000002)'
        required: true
        default: 'SH000001'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖包
      run: pip install -r requirements.txt

    - name: 运行爬虫程序
      env:
        STOCK_CODE: ${{ github.event.inputs.stock_id }}
      run: python scraper.py
