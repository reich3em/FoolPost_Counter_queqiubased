name: Guba Range Scraper (Main2)

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '股票代码 (如 300059)'
        required: true
        default: '300059'
      start_page:
        description: '起始页码'
        required: true
        default: '1'
      end_page:
        description: '结束页码'
        required: true
        default: '5'

jobs:
  run_main2:
    runs-on: ubuntu-latest
    # 给予写入权限，否则 push 会失败
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Execute Main2 Script
        env:
          STOCK_CODE: ${{ github.event.inputs.stock_code }}
          START_PAGE: ${{ github.event.inputs.start_page }}
          END_PAGE: ${{ github.event.inputs.end_page }}
        # 这里指定运行 main2.py
        run: python main2.py

      - name: Commit and Push CSV
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Main2: Update data for ${{ github.event.inputs.stock_code }}" || exit 0
          git push
