name: Batch Guba Scraper (Main2)

on:
  workflow_dispatch:
    inputs:
      max_stocks:
        description: '爬取前多少个股票（从 stocks.txt 顶部开始算）'
        required: true
        default: '5'
      start_page:
        description: '每个股票从第几页开始'
        required: true
        default: '1'
      end_page:
        description: '每个股票到第几页结束'
        required: true
        default: '2'

jobs:
  run_task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run Scraper
        env:
          MAX_STOCKS: ${{ github.event.inputs.max_stocks }}
          START_PAGE: ${{ github.event.inputs.start_page }}
          END_PAGE: ${{ github.event.inputs.end_page }}
        run: python main2.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Main2: Batch crawl result" || exit 0
          git push
